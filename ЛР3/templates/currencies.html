<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Currencies</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="icon" href="https://img.icons8.com/?size=100&id=60jNlf0wNMdq&format=png&color=000000">
</head>
<body class="bg-dark text-light">

    <!-- Кнопка "На главную" -->
    <div class="container">
        <div class="row justify-content-start">
            <a class="col-auto g-3" href="/">На главную</a>
        </div>
    </div>

    <!-- Кнопка для обновления курса валют -->
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-auto g-3">
                <a id="updateCurrenciesButton" class="btn btn-primary" href="/currencies/update">Обновить данные о курсах валют</a>
            </div>
        </div>
    </div>

    <!-- Название таблицы -->
    <div class="container mt-5">
        <div class="row justify-content-center">
            <h2 class="col-auto g-4">Текущие курсы валют</h2>
        </div>
    </div>

    <!-- Таблица -->
    <div class="container mt-5">
        <div class="row justify-content-center">
            <table class="table table-striped table-hover w-auto text-center table-dark">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Код</th>
                        <th>Название</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Цикл по всем валютным объектам -->
                    {% for curr in currencies %}
                    <tr>
                        <td>{{ curr.id }}</td>
                        <td>{{ curr.code }}</td>
                        <td>{{ curr.name }}</td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="3" class="text-center">Таблица пуста</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <!-- Подключаем JS -->
    <script src="{{ url_for('static', path='js/currencies.js') }}"></script>
</body>
</html>
