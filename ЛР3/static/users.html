<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Users</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-dark text-light">

    <!-- Контейнер для форм -->
    <div class="container">

        <!-- Форма для создания нового пользователя или обновления информации о нём -->
        <div class="row justify-content-center">
            <form method="post" action="/users" class="col-auto g-3">
                <label>
                    Имя
                    <input type="text" class="form-control" name="username" required>
                </label>
                <label>
                    Почта
                    <input type="email" class="form-control" name="email" required>
                </label>
                <button type="submit" class="btn btn-primary">Создать нового пользователя</button>
            </form>
        </div>

        <!-- Форма для удаления пользователя по имени-->
        <div class="row justify-content-center">
            <form method="" action="/users" class="col-auto g-4">
                <label>
                    Имя
                    <input type="text" class="form-control" required>
                </label>
                <button type="submit" class="btn btn-danger">Удалить пользователя</button>
            </form>
        </div>
    </div>

    <!-- Контейнер для списка пользователей -->
    <div class="container mt-3">

    </div>


</body>
</html>
