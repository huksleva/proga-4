<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Users</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="icon" href="https://img.icons8.com/?size=100&id=60jNlf0wNMdq&format=png&color=000000">
</head>
<body class="bg-dark text-light">

    <!-- Кнопка "На главную" -->
    <div class="container">
        <div class="row justify-content-start">
            <a class="col-auto g-3" href="/">На главную</a>
        </div>
    </div>

    <!-- Контейнер для форм -->
    <div class="container mb-5">

        <!-- Форма для создания нового пользователя или обновления информации о нём -->
        <div class="row justify-content-center">
            <form method="post" action="/users" class="col-auto g-3">
                <label>
                    Имя
                    <input type="text" class="form-control" name="username" required>
                </label>
                <label>
                    Почта
                    <input type="email" class="form-control" name="email" required>
                </label>
                <button type="submit" class="btn btn-primary">Создать нового пользователя</button>
            </form>
        </div>

        <!-- Форма для удаления пользователя по имени-->
        <div class="row justify-content-center">
            <form method="get" action="/users" class="col-auto g-4">
                <label>
                    Имя
                    <input type="text" class="form-control" required>
                </label>
                <button type="submit" class="btn btn-danger">Удалить пользователя</button>
            </form>
        </div>
    </div>

    <!-- Название таблицы -->
    <div class="container mt-5">
        <div class="row justify-content-center">
            <h2 class="col-auto">Список пользователей</h2>
        </div>
    </div>

    <!-- Таблица -->
    <div class="container mt-4">
        <div class="row justify-content-center">
            <table class="table table-striped table-hover w-auto text-center table-dark">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Имя</th>
                        <th>Email</th>
                        <th>Дата и время создания</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Цикл по всем пользователям -->
                    {% for user in users %}
                    <tr>
                        <td>{{ user.id }}</td>
                        <td><a href="/users/{{ user.id }}">{{ user.username }}</a></td>
                        <td>{{ user.email }}</td>
                        <td>{{ user.created_at }}</td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="4" class="text-center">Таблица пуста</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
