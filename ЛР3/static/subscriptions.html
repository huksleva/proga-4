<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <title>Subscriptions</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
        <link rel="icon" href="https://img.icons8.com/?size=100&id=60jNlf0wNMdq&format=png&color=000000">
    </head>
    <body class="bg-dark text-light">

        <!-- Кнопка "На главную" -->
        <div class="container">
            <div class="row justify-content-start">
                <a class="col-auto g-3" href="/">На главную</a>
            </div>
        </div>

        <!-- Форма для создания подписки пользователя на валюту -->
        <div class="row justify-content-center">
            <form method="post" id="addSubscriptionToUser" class="col-auto g-3">
                <label>
                    ID пользователя
                    <input type="number" min="1" class="form-control" name="user_id" required>
                </label>
                <label>
                    ID валюты
                    <input type="number" min="0" class="form-control" name="currency_id" required>
                </label>
                <button type="submit" class="btn btn-primary">Добавить подписку</button>
            </form>
        </div>

        <!-- Форма для удаления подписки пользователя на валюту -->
        <div class="row justify-content-center">
            <form id="deleteUserSubscription" class="col-auto g-3">
                <label>
                    ID пользователя
                    <input type="number" min="1" class="form-control" name="user_id" required>
                </label>
                <label>
                    ID валюты
                    <input type="number" min="0" class="form-control" name="currency_id" required>
                </label>
                <button type="submit" class="btn btn-danger">Удалить подписку</button>
            </form>
        </div>

        <!-- Название таблицы -->
        <div class="container mt-5">
            <div class="row justify-content-center">
                <h2 class="col-auto">Подписки пользователей</h2>
            </div>
        </div>

        <!-- Таблица -->
        <div class="container mt-4">
            <div class="row justify-content-center">
                <table class="table table-striped table-hover w-auto text-center table-dark">
                    <thead>
                        <tr>
                            <th>User ID</th>
                            <th>Currency ID</th>
                        </tr>
                    </thead>
                    <tbody id="subscriptionsList">
                        <!-- Цикл по всем подпискам -->
                        {% for sub in subscriptions %}
                        <tr>
                            <td>{{ sub.user_id }}</td>
                            <td>{{ sub.currency_id }}</td>
                        </tr>
                        {% else %}
                        <tr id="noSubscriptionsRow">
                            <td colspan="2" class="text-center">Нет активных подписок</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Подключаем JS -->
        <script src="{{ url_for('src', path='subscriptions.js') }}?v={{ file_mtime }}"></script>
    </body>
</html>
