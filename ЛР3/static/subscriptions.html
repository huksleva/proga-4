<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Subscriptions</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="icon" href="https://img.icons8.com/?size=100&id=60jNlf0wNMdq&format=png&color=000000">
</head>
<body class="bg-dark text-light">

    <!-- Кнопка "На главную" -->
    <div class="container">
        <div class="row justify-content-start">
            <a class="col-auto g-3" href="/">На главную</a>
        </div>
    </div>

    <!-- Название таблицы -->
    <div class="container mt-5">
        <div class="row justify-content-center">
            <h2 class="col-auto">Подписки пользователей</h2>
        </div>
    </div>

    <!-- Таблица -->
    <div class="container mt-4">
        <div class="row justify-content-center">
            <table class="table table-striped table-hover w-auto text-center table-dark">
                <thead>
                    <tr>
                        <th>User ID</th>
                        <th>Currency ID</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Цикл по всем подпискам -->
                    {% for sub in subscriptions %}
                    <tr>
                        <td>{{ sub.user_id }}</td>
                        <td>{{ sub.currency_id }}</td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="2" class="text-center">Таблица пуста</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>


</body>
</html>
