<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Currencies</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-dark text-light">

    <!-- Кнопка "На главную" -->
    <div class="container">
        <div class="row justify-content-start">
            <a class="col-auto g-3" href="/">На главную</a>
        </div>
    </div>

    <!-- Название таблицы -->
    <div class="container mt-5">
        <div class="row justify-content-center">
            <h2 class="col-auto g-4">Текущие курсы валют</h2>
        </div>
    </div>

    <!-- Таблица -->
    <div class="container mt-5">
        <div class="row justify-content-center">
            <table class="table table-striped table-hover w-auto text-center table-dark">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Код (CharCode)</th>
                        <th>Название</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Цикл по всем валютным объектам -->
                    {% for curr in currencies %}
                    <tr>
                        <td>{{ curr.id }}</td>
                        <td><b>{{ curr.code }}</b></td>
                        <td>{{ curr.name }}</td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="3" class="text-center">Таблица пуста</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
