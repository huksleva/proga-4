<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Страница не найдена</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="icon" href="https://img.icons8.com/?size=100&id=60jNlf0wNMdq&format=png&color=000000">
    <link rel="stylesheet" href="../css/404.css">
</head>
<body class="bg-dark text-light d-flex align-items-center justify-content-center min-vh-100 position-relative overflow-hidden">

    <!-- Декоративное свечение на фоне -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="container text-center px-4">

        <!-- Анимированная 404 -->
        <h1 class="display-1 fw-bold gradient-text floating mb-0">404</h1>

        <!-- Иконка/эмодзи -->
        <div class="fs-1 mb-4">🔍</div>

        <!-- Заголовок -->
        <h2 class="h3 fw-semibold mb-3">Страница не найдена</h2>

        <!-- Описание -->
        <p class="text-secondary mb-5" style="max-width: 400px; margin: 0 auto;">
            Похоже, ссылка ведёт в никуда.
            Возможно, страница была удалена или вы ввели неверный адрес.
        </p>

        <!-- Кнопки действий -->
        <div class="d-flex flex-column flex-sm-row gap-3 justify-content-center">
            <button onclick="history.back()" class="btn btn-outline-light btn-lg px-4">
                ← Назад
            </button>
            <a href="/" class="btn btn-primary btn-lg btn-glow px-4">
                🏠 На главную
            </a>
        </div>

    </div>


    <!-- Подключаем JS -->
    <script src="{{ url_for('src', path='404.js') }}"></script>
</body>
</html>
