<!DOCTYPE html>
<HTML lang="ru">
    <head>
        <title>1153307</title>

        <!-- Required meta tags -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    </head>
    <body style="background-color: rgb(35, 34, 39);">

        <!-- Заголовок вверху страницы -->
        <div class="container-fluid d-flex align-items-center justify-content-center text-white">
            <h1 class="mt-5 title-underline">Симулятор очереди</h1>
        </div>

        <!-- Белая линия под заголовком -->
        <style>
            .title-underline {
                display: inline-block;
                border-bottom: 4px solid #FFFFFF;
                padding-bottom: 20px;
            }
        </style>

        <!-- Контейнер с кнопками -->
        <div class="container-fluid d-flex align-items-center justify-content-center text-white">
            <div class="row w-100 justify-content-center g-3 mt-4">
                <div class="col-auto">
                    <form action="/createObject" method="post">
                        <button type="submit" class="btn btn-primary">Добавить новый элемент (в конец очереди)</button>
                    </form>


                </div>
                <div class="col-auto">
                    <button type="button" class="btn btn-danger">Удалить элемент (с начала очереди)</button>
                </div>
                <div class="col-auto">
                    <button type="button" class="btn btn-danger">Удалить все элементы</button>
                </div>
            </div>
        </div>

        <!-- Контейнер с элементами -->
        <div class="container-fluid d-flex align-items-center justify-content-center text-white">
            <div class="row w-100 justify-content-center" style="background-color: rgb(0, 0, 0); margin-top: 100px;">

            </div>
        </div>
    </body>
</HTML>
