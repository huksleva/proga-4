<!DOCTYPE html>
<html>
<head>
    <title>1153307</title>
    <meta charset="utf-8">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- Vue контейнер -->
    <div id="app">

        <a href="/login">login</a>


        <!-- Форма 1 -->
        <form name="Form1" @submit.prevent="uploadSize">
            <div class="file-upload">
                <input type="file" id="file1" name="image" accept=".png" @change="selectFile1" required style="display: none;">
                <label for="file1" class="file-label">
                    <span class="file-text" v-text="file1NameValue"></span>
                    <span class="file-button">📁 Обзор</span>
                </label>
            </div>
            <button type="submit" name="btn" :disabled="loading || !file1" class="btn-primary">
                Отправить изображение (основное задание)
            </button>
        </form>

        <!-- Форма 2 -->
        <form name="Form2" @submit.prevent="uploadPicture">
            <div class="file-upload">
                <input type="file" id="file2" name="image" @change="selectFile2" accept="image/*" required style="display: none;">
                <label for="file2" class="file-label">
                    <span class="file-text" v-text="file2NameValue"></span>
                    <span class="file-button">📁 Обзор</span>
                </label>
            </div>
            <button type="submit" name="btn" :disabled="loading || !file2" class="btn-success">
                Вывести изображение на экран (усложнённое задание)
            </button>
        </form>


        <button @click="clearUploads" class="btn-danger">
            Очистить папку uploads
        </button>

        <!-- Результаты (обёртка raw для Jinja2) -->
        {% raw %}
        <div v-if="pictureResult" class="result success">
            <img :src="pictureResult.image_url" alt="Uploaded">
            <p><span v-text="pictureResult.filename"></span></p>
        </div>

        <div v-if="lastUpload" class="result">
            <h3>Последний файл:</h3>
            <img :src="lastUpload.image_url" alt="Last">
            <p><span v-text="lastUpload.filename"></span></p>
        </div>

        <div v-if="loading" class="result">Загрузка...</div>
        {% endraw %}

        <div v-if="loading" class="result">Загрузка...</div>

    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
